services:
  proxy:
    profiles: ["disabled"]  # Traefik not needed for tunnel

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run product-editor
    volumes:
      - /Users/kannaperumal/.cloudflared/8b5f79f2-f6a3-49e8-bdfc-d13187246dfd.json:/etc/cloudflared/credentials.json:ro
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
    networks:
      - web
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
