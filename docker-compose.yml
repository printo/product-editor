services:
  proxy:
    image: traefik:v3.0
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.constraints=Label(`traefik.project`,`product-editor`)
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./proxy/traefik/acme.json:/letsencrypt/acme.json
      - ./proxy/traefik/.htpasswd:/etc/traefik/.htpasswd:ro
    networks:
      - web

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - web
    deploy:
      resources:
        reservations:
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_MAX_CONNECTIONS=100
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web
    deploy:
      resources:
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/django/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - STORAGE_ROOT=/app/storage
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.project=product-editor
      # Middlewares
      - traefik.http.middlewares.admin-basicauth.basicauth.usersfile=/etc/traefik/.htpasswd
      # Backend API (websecure)
      - traefik.http.routers.product-editor-backend-tls.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/api`)
      - traefik.http.routers.product-editor-backend-tls.entrypoints=websecure
      - traefik.http.routers.product-editor-backend-tls.priority=2
      - traefik.http.routers.product-editor-backend-tls.tls.certresolver=letsencrypt
      - traefik.http.routers.product-editor-backend-tls.service=product-editor-backend
      - traefik.http.services.product-editor-backend.loadbalancer.server.port=8000
      # Django Admin (websecure)
      - traefik.http.routers.product-editor-admin.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/admin/django-admin`)
      - traefik.http.routers.product-editor-admin.entrypoints=websecure
      - traefik.http.routers.product-editor-admin.tls.certresolver=letsencrypt
      - traefik.http.routers.product-editor-admin.middlewares=admin-basicauth
      - traefik.http.routers.product-editor-admin.service=product-editor-backend
    networks:
      - web

  frontend:
    build:
      context: .
      dockerfile: frontend/nextjs/Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
        - NEXT_PUBLIC_DIRECT_API_KEY=${DIRECT_API_KEY:-}
    ports:
      - "${FRONTEND_HOST_PORT:-5004}:3000"  # can override with FRONTEND_HOST_PORT in .env if occupied
    env_file:
      - .env
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_BASE_URL=/api
      - INTERNAL_API_URL=http://backend:8000/api
      - NODE_ENV=${NODE_ENV:-production}
      - AUTH_URL=https://${PUBLIC_HOST}
      - NEXTAUTH_URL=https://${PUBLIC_HOST}
      - AUTH_TRUST_HOST=true
      - AUTH_SECRET=${AUTH_SECRET:-change-me-at-least-32-chars}
      - NEXTAUTH_SECRET=${AUTH_SECRET:-change-me-at-least-32-chars}
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.project=product-editor
      - traefik.http.routers.product-editor-frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.product-editor-frontend.entrypoints=web
      - traefik.http.routers.product-editor-frontend.priority=1
      - traefik.http.services.product-editor-frontend.loadbalancer.server.port=3000
      - traefik.docker.network=product-editor_web
      - traefik.http.routers.product-editor-nextauth.rule=PathPrefix(`/api/auth`)
      - traefik.http.routers.product-editor-nextauth.entrypoints=web
      - traefik.http.routers.product-editor-nextauth.priority=3
      - traefik.http.routers.product-editor-nextauth.service=product-editor-frontend
      - traefik.http.routers.product-editor-frontend-tls.rule=Host(`${PUBLIC_HOST}`)
      - traefik.http.routers.product-editor-frontend-tls.entrypoints=websecure
      - traefik.http.routers.product-editor-frontend-tls.priority=1
      - traefik.http.routers.product-editor-frontend-tls.tls.certresolver=letsencrypt
      - traefik.http.routers.product-editor-nextauth-tls.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/api/auth`)
      - traefik.http.routers.product-editor-nextauth-tls.entrypoints=websecure
      - traefik.http.routers.product-editor-nextauth-tls.priority=3
      - traefik.http.routers.product-editor-nextauth-tls.tls.certresolver=letsencrypt
      - traefik.http.routers.product-editor-nextauth-tls.service=product-editor-frontend
      # Frontend internal proxy route (higher priority than backend /api rule at priority=2)
      - traefik.http.routers.product-editor-frontend-internal-proxy-tls.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/api/internal/proxy`)
      - traefik.http.routers.product-editor-frontend-internal-proxy-tls.entrypoints=websecure
      - traefik.http.routers.product-editor-frontend-internal-proxy-tls.priority=3
      - traefik.http.routers.product-editor-frontend-internal-proxy-tls.tls.certresolver=letsencrypt
      - traefik.http.routers.product-editor-frontend-internal-proxy-tls.service=product-editor-frontend
      # Frontend embed proxy route (higher priority than backend /api rule at priority=2)
      - traefik.http.routers.product-editor-frontend-embed-proxy-tls.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/api/embed/proxy`)
      - traefik.http.routers.product-editor-frontend-embed-proxy-tls.entrypoints=websecure
      - traefik.http.routers.product-editor-frontend-embed-proxy-tls.priority=3
      - traefik.http.routers.product-editor-frontend-embed-proxy-tls.tls.certresolver=letsencrypt
      - traefik.http.routers.product-editor-frontend-embed-proxy-tls.service=product-editor-frontend
    networks:
      - web

  # ── Priority worker — soft-proof / express / store-pickup orders ─────────────
  # Listens ONLY to the 'priority' queue so standard-queue backlog never delays
  # time-sensitive renders.
  # Concurrency: auto-detected from CPU count (no CELERY_CONCURRENCY override).
  # Set CELERY_CONCURRENCY in .env if you need to cap it on a shared server.
  # Memory: 2 GB limit — Pillow CMYK soft-proof peak is ~400-600 MB per task;
  # this gives headroom for the auto-detected concurrency level.
  celery-worker-priority:
    build:
      context: .
      dockerfile: backend/django/Dockerfile
    command: celery-worker
    env_file:
      - .env
    environment:
      - STORAGE_ROOT=/app/storage
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_QUEUE=priority
      # CELERY_CONCURRENCY is intentionally NOT set here — Celery auto-detects
      # based on the number of CPUs available to the container.
      # Override in .env (e.g. CELERY_CONCURRENCY=4) if needed.
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped

  # ── Standard worker ────────— PNG/TIFF exports for regular delivery orders ────────
  # Scale horizontally under load:
  #   docker compose up --scale celery-worker-standard=4
  # Concurrency: auto-detected from CPU count per replica.
  # Memory: 2 GB per replica — safe for large multi-image Pillow compositing.
  celery-worker-standard:
    build:
      context: .
      dockerfile: backend/django/Dockerfile
    command: celery-worker
    env_file:
      - .env
    environment:
      - STORAGE_ROOT=/app/storage
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_QUEUE=standard
      # CELERY_CONCURRENCY is intentionally NOT set here — Celery auto-detects
      # based on the number of CPUs available to the container.
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: backend/django/Dockerfile
    command: celery-beat
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web
    restart: unless-stopped

networks:
  web:

volumes:
  postgres_data:
  redis_data:
