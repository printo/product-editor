services:
  proxy:
    image: traefik:v3.0
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.constraints=Label(`traefik.project`,`product-editor`)
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=admin@example.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./proxy/traefik/acme.json:/letsencrypt/acme.json
      - ./proxy/traefik/.htpasswd:/etc/traefik/.htpasswd:ro
    networks:
      - web

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/django/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - STORAGE_ROOT=/app/storage
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.project=product-editor
      - traefik.http.routers.product-editor-backend.rule=PathPrefix(`/api`)
      - traefik.http.routers.product-editor-backend.entrypoints=web
      - traefik.http.routers.product-editor-backend.priority=2
      - traefik.http.routers.product-editor-backend.service=product-editor-backend
      - traefik.http.services.product-editor-backend.loadbalancer.server.port=8000
      - traefik.docker.network=product-editor_web
      - traefik.http.middlewares.admin-basicauth.basicauth.usersfile=/etc/traefik/.htpasswd
      - traefik.http.middlewares.admin-redirect.redirectscheme.scheme=https
      - traefik.http.routers.product-editor-admin.rule=PathPrefix(`/admin/django-admin`)
      - traefik.http.routers.product-editor-admin.entrypoints=web
      - traefik.http.routers.product-editor-admin.middlewares=admin-redirect
      - traefik.http.routers.product-editor-admin.service=product-editor-backend
      - traefik.http.routers.product-editor-backend-tls.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/api`)
      - traefik.http.routers.product-editor-backend-tls.entrypoints=websecure
      - traefik.http.routers.product-editor-backend-tls.priority=2
      - traefik.http.routers.product-editor-backend-tls.service=product-editor-backend
      - traefik.http.routers.product-editor-admin-tls.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/admin/django-admin`)
      - traefik.http.routers.product-editor-admin-tls.entrypoints=websecure
      - traefik.http.routers.product-editor-admin-tls.middlewares=admin-basicauth
      - traefik.http.routers.product-editor-admin-tls.service=product-editor-backend
    networks:
      - web

  frontend:
    build:
      context: .
      dockerfile: frontend/nextjs/Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
        - NEXT_PUBLIC_DIRECT_API_KEY=${DIRECT_API_KEY:-}
    ports:
      - "${FRONTEND_HOST_PORT:-5004}:3000"  # can override with FRONTEND_HOST_PORT in .env if occupied
    env_file:
      - .env
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_BASE_URL=/api
      - INTERNAL_API_URL=http://backend:8000/api
      - NODE_ENV=${NODE_ENV:-production}
      - AUTH_URL=https://${PUBLIC_HOST}
      - AUTH_TRUST_HOST=true
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.project=product-editor
      - traefik.http.routers.product-editor-frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.product-editor-frontend.entrypoints=web
      - traefik.http.routers.product-editor-frontend.priority=1
      - traefik.http.services.product-editor-frontend.loadbalancer.server.port=3000
      - traefik.docker.network=product-editor_web
      - traefik.http.routers.product-editor-nextauth.rule=PathPrefix(`/api/auth`)
      - traefik.http.routers.product-editor-nextauth.entrypoints=web
      - traefik.http.routers.product-editor-nextauth.priority=3
      - traefik.http.routers.product-editor-nextauth.service=product-editor-frontend
      - traefik.http.routers.product-editor-frontend-tls.rule=Host(`${PUBLIC_HOST}`)
      - traefik.http.routers.product-editor-frontend-tls.entrypoints=websecure
      - traefik.http.routers.product-editor-frontend-tls.priority=1
      - traefik.http.routers.product-editor-nextauth-tls.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/api/auth`)
      - traefik.http.routers.product-editor-nextauth-tls.entrypoints=websecure
      - traefik.http.routers.product-editor-nextauth-tls.priority=3
      - traefik.http.routers.product-editor-nextauth-tls.service=product-editor-frontend
    networks:
      - web

networks:
  web:

volumes:
  postgres_data:
  redis_data:
